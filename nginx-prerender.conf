# Добавить в НАЧАЛО nginx конфига (вне server {}), если ещё нет блока map:
map $http_user_agent $is_bot {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*yandex 1;
    ~*baiduspider 1;
    ~*facebookexternalhit 1;
    ~*twitterbot 1;
    ~*linkedinbot 1;
    ~*whatsapp 1;
    ~*telegrambot 1;
    ~*vkshare 1;
    ~*slackbot 1;
}

# Добавить ВНУТРИ server {}, перед location / :
location ~ ^/equipment/(.+)$ {
    if ($is_bot = 1) {
        proxy_pass http://localhost:3002/prerender/equipment/$1;
        break;
    }
    try_files $uri $uri/ /index.html;
}
